name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-contract:
    name: Public contract checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate companion event fixture
        run: python scripts/validate_companion_event.py examples/companion-event.example.json

      - name: Public-safety scan
        run: python scripts/public_safe_check.py

  android:
    name: Android scaffold checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Gradle wrapper
        id: gradle-wrapper
        run: |
          if [ -x ./gradlew ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Gradle wrapper is not present yet; skipping Android scaffold checks."
          fi

      - name: Set up JDK
        if: steps.gradle-wrapper.outputs.available == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        if: steps.gradle-wrapper.outputs.available == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM unit tests
        if: steps.gradle-wrapper.outputs.available == 'true'
        run: ./gradlew :app:testDebugUnitTest

      - name: Assemble debug scaffold
        if: steps.gradle-wrapper.outputs.available == 'true'
        run: ./gradlew :app:assembleDebug
